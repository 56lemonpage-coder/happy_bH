<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>♥두근두근♥케이크만들기!</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/galmuri@latest/dist/galmuri.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;image-rendering:pixelated;}
body{background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Galmuri11', monospace;}
#stage{position:relative;width:min(1100px,100vw);max-height:100vh;aspect-ratio:1350/850;background:#1a1a2e;overflow:hidden;cursor:pointer;}
#stage-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:opacity 0.6s;z-index:1;}
#title-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);z-index:10;}
#title-text{font-family:'Press Start 2P', 'Galmuri11', monospace;font-size:clamp(18px,3vw,40px);color:#fff;text-align:center;white-space:pre-line;line-height:1.6;text-shadow:0 0 20px rgba(150,100,255,.9),3px 3px 0 rgba(0,0,0,.5);letter-spacing:0.04em;animation:titlePulse 3s ease-in-out infinite;}
@keyframes titlePulse{0%,100%{text-shadow:0 0 20px rgba(150,100,255,.8),3px 3px 0 rgba(0,0,0,.5)}50%{text-shadow:0 0 40px rgba(200,150,255,1),3px 3px 0 rgba(0,0,0,.5)}}
#title-hint{font-family:'Press Start 2P', 'Galmuri11', monospace;font-size:clamp(8px,1.1vw,12px);color:rgba(255,255,255,.65);margin-top:32px;letter-spacing:0.06em;animation:blink 1.2s step-end infinite;}
@keyframes blink{50%{opacity:0}}
#dialog-box{position:absolute;bottom:4%;left:3%;right:3%;background:rgba(10,10,30,0.88);border:2px solid rgba(180,180,220,0.7);outline:1px solid rgba(80,80,120,0.5);outline-offset:2px;padding:clamp(10px,2%,20px);z-index:52;box-shadow:0 0 0 1px rgba(0,0,0,.8),inset 0 0 30px rgba(100,80,180,.08);display:none;min-height:18%;}
#speaker-name{position:absolute;top:-26px;left:14px;background:rgba(10,10,30,0.95);color:#e8e0ff;padding:4px 16px;font-family:'Press Start 2P', 'Galmuri11', monospace;font-size:clamp(8px,1vw,11px);border:2px solid rgba(180,180,220,0.7);border-bottom:2px solid rgba(10,10,30,0.95);letter-spacing:0.05em;display:none;}
#dialog-text{font-family:'Galmuri11', monospace;font-size:clamp(11px,1.6vw,16px);color:#eeeeff;line-height:1.8;min-height:2.5em;padding-right:40px;text-shadow:0 0 8px rgba(180,160,255,.3);}
#dialog-continue{position:absolute;bottom:10px;right:18px;color:rgba(200,180,255,.8);font-size:clamp(14px,1.8vw,22px);animation:arrowBounce .8s ease-in-out infinite;cursor:pointer;display:none;}
@keyframes arrowBounce{0%,100%{transform:translateY(0);opacity:.6}50%{transform:translateY(5px);opacity:1}}
#choices-box{position:absolute;bottom:26%;left:3%;right:3%;display:none;flex-wrap:wrap;gap:10px 14px;z-index:25;justify-content:center;align-items:center;}
.choice-btn{background:rgba(20,15,50,0.92);border:2px solid rgba(180,160,255,0.6);color:#e8e0ff;padding:10px 22px;font-family:'Galmuri11', monospace;font-size:clamp(11px,1.3vw,15px);cursor:pointer;transition:all .15s;min-width:120px;display:flex;align-items:center;gap:8px;box-shadow:0 0 0 1px rgba(0,0,0,.8),2px 2px 0 rgba(0,0,0,.5);}
.choice-btn::before{content:"▶";font-size:.7em;color:rgba(180,160,255,.7);flex-shrink:0;transition:transform .15s,color .15s;}
.choice-btn:hover{background:rgba(80,60,160,0.95);color:#fff;border-color:rgba(220,200,255,.9);transform:translateY(-2px);}
.choice-btn:hover::before{color:#fff;transform:translateX(2px);}
#game-topbar{position:absolute;top:2%;right:2%;display:none;gap:15px;z-index:65;}
.tbtn{background:transparent;border:none;color:#000;width:clamp(32px,4vw,44px);height:clamp(32px,4vw,44px);font-size:clamp(20px,2.5vw,32px);cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:.7;transition:all .2s;}
.tbtn:hover{opacity:1;transform:scale(1.15);}
#vol-panel{display:none;position:absolute;top:calc(2% + 50px);right:2%;z-index:31;background:rgba(10,10,30,0.95);border:2px solid rgba(180,180,220,0.6);padding:12px 16px;box-shadow:0 0 0 1px rgba(0,0,0,.8);min-width:180px;color:#eeeeff;}
#vol-panel label{font-size:11px;color:#c8c0ff;display:block;margin-bottom:8px;font-weight:bold;}
#ov{position:absolute;inset:0;background:#000;opacity:0;pointer-events:none;z-index:50;transition:opacity .4s;}
#char-layer{position:absolute;inset:0;pointer-events:none;z-index:10;}
.cslot{position:absolute;bottom:0;transform:translateX(-50%);max-height:85%;object-fit:contain;}
@keyframes cfade{from{opacity:0;transform:translateX(-50%) translateY(18px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
#ending-overlay{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.75);z-index:54;}
#ending-num{font-family:'Press Start 2P', 'Galmuri11', monospace;font-size:clamp(22px,3.5vw,50px);color:#fff;text-shadow:0 0 30px rgba(200,150,255,1);text-align:center;}
#ending-desc{font-family:'Galmuri11', monospace;font-size:clamp(11px,1.4vw,16px);color:rgba(230,220,255,.9);margin-top:16px;text-align:center;line-height:1.9;white-space:pre-line;max-width:80%;}
#ending-hint{font-family:'Galmuri11', monospace;font-size:11px;color:rgba(255,255,255,.5);margin-top:22px;animation:blink 1.4s step-end infinite;}
/* ===== 모바일 세로 최적화 ===== */
@media (max-width: 600px) and (orientation: portrait) {

  /* 스테이지를 화면 전체 너비로 */
  #stage {
    width: 100vw;
    height: 100svh;
    aspect-ratio: unset;
    max-height: none;
  }

  /* 대화창 높이 넉넉하게 */
  #dialog-box {
    bottom: 2%;
    left: 2%;
    right: 2%;
    min-height: 22%;
    padding: 14px 16px;
  }

  /* 대화 텍스트 크게 */
  #dialog-text {
    font-size: 14px;
    line-height: 1.9;
  }

  /* 화자 이름 */
  #speaker-name {
    font-size: 10px;
  }

  /* 선택지 버튼 — 터치하기 쉽게 */
  #choices-box {
    bottom: 28%;
    left: 2%;
    right: 2%;
    flex-direction: column;
    gap: 8px;
  }

  .choice-btn {
    width: 100%;
    min-width: unset;
    font-size: 14px;
    padding: 13px 18px;
    min-height: 48px; /* 터치 최소 크기 */
  }

  /* 상단 버튼 (홈·볼륨) 크게 */
  .tbtn {
    width: 44px;
    height: 44px;
    font-size: 26px;
  }

  /* 타이틀 텍스트 */
  #title-text {
    font-size: clamp(16px, 5vw, 26px);
  }

  #title-hint {
    font-size: clamp(9px, 2.5vw, 13px);
  }

  /* 엔딩 화면 */
  #ending-desc {
    font-size: 13px;
    max-width: 92%;
  }

}</style></head>
<body onclick="handleClick()">
<div id="LDR" style="position:fixed;inset:0;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;color:#fff;font-family:sans-serif;">
  <div style="font-size:18px;margin-bottom:10px;letter-spacing:2px;">LOADING</div>
  <div style="width:150px;height:2px;background:#333;position:relative;overflow:hidden;"><div style="position:absolute;top:0;left:0;height:100%;width:50%;background:#7c3aed;animation:ldr 1.5s infinite ease-in-out;"></div></div>
  <style>@keyframes ldr{0%{left:-50%}100%{left:100%}}</style>
</div>
<div id="stage">
  <img id="stage-bg" src="" style="opacity:0">
  <div id="char-layer"></div>
  <div id="title-overlay"><div id="title-text"></div><div id="title-hint"></div></div>
  <div id="game-topbar">
    <button class="tbtn" onclick="event.stopPropagation();goTitle()" title="타이틀">&#127968;</button>
    <button class="tbtn" onclick="event.stopPropagation();toggleVol()" title="볼륨">&#128266;</button>
  </div>
  <div id="vol-panel">
    <label>BGM 볼륨</label><input type="range" min="0" max="100" value="25" style="width:100%;margin-bottom:10px" oninput="setBVol(this.value)">
    <label>효과음 볼륨</label><input type="range" min="0" max="100" value="41" style="width:100%" oninput="setSVol(this.value)">
  </div>
  <div id="dialog-box"><div id="speaker-name"></div><div id="dialog-text"></div><div id="dialog-continue" onclick="event.stopPropagation();handleClick()">&#9660;</div></div>
  <div id="choices-box"></div>
  <div id="ov"></div>
  <div id="ending-overlay"><div id="ending-num"></div><div id="ending-desc"></div><div id="ending-hint">&#9660; 클릭하면 타이틀로</div></div>
</div>

function showScene(i){
  if(i<0||i>=SC.length){showEnd();return;}
  var s=SC[i];idx=i;
  var p=s.transition!=="instant"?doFade():Promise.resolve();
  p.then(function(){
    var bg=$i("stage-bg");
    if(s.bgUrl){bg.src=s.bgUrl;bg.style.opacity="1";}
    renderChars(s);
    if(s.bgmUrl&&(!bgm||bgm._u!==s.bgmUrl)){stopBgm();bgm=new Audio(s.bgmUrl);bgm._u=s.bgmUrl;bgm.loop=true;bgm.volume=bv;bgm.play().catch(function(){});}
    else if(s.bgmStop){stopBgm();}
    if(s.type==="end"){showEnd(s);return;}
    if(s.type==="deco"){showDeco(s);return;}
    if(s.type==="choice"){showText(s);showChoices(s);return;}
    showText(s);
  });
}

function buildDecoImg(stage,cvs,bgSrc,panelH){
  return new Promise(function(resolve){
    var DECO_FIXED_SIZE=400;
    var cv=document.createElement("canvas");cv.width=DECO_FIXED_SIZE;cv.height=DECO_FIXED_SIZE;
    var ctx=cv.getContext("2d");
    function drawItems(){
      var items=Array.prototype.slice.call(cvs.querySelectorAll(".dp"));
      items.sort(function(a,b){return (parseInt(a.style.zIndex)||35)-(parseInt(b.style.zIndex)||35);});
      var i=0;
      function next(){
        if(i>=items.length){resolve(cv.toDataURL("image/png"));return;}
        var wrap=items[i++];
        var img=wrap.querySelector("img");if(!img){next();return;}
        var ox=parseFloat(wrap.style.left);
        var oy=parseFloat(wrap.style.top);
        var rot=0;var m=wrap.style.transform.match(/rotate\(([-\d.]+)deg\)/);if(m)rot=parseFloat(m[1]);
        var im=new Image();im.crossOrigin="anonymous";
        im.onload=function(){
          ctx.save();ctx.translate(ox,oy);ctx.rotate(rot*Math.PI/180);
          var ww=parseFloat(wrap.style.width)||(wrap.offsetWidth||120);var wh=parseFloat(wrap.style.height)||(wrap.offsetHeight||120);
          ctx.drawImage(im,-ww/2,-wh/2,ww,wh);
          ctx.restore();next();
        };
        im.onerror=function(){console.error("Deco item load fail",img.src);next();};
        if(img.src.startsWith("data:"))im.src=img.src;else im.src=img.src+(img.src.indexOf("?")>-1?"&":"?")+"t="+Date.now();
      }
      next();
    }
    if(bgSrc){
      var bi=new Image();bi.crossOrigin="anonymous";
      bi.onload=function(){
        ctx.drawImage(bi,0,0,DECO_FIXED_SIZE,DECO_FIXED_SIZE);
        drawItems();
      };
      bi.onerror=function(){console.error("BG load fail",bgSrc);drawItems();};
      if(bgSrc.startsWith("data:"))bi.src=bgSrc;else bi.src=bgSrc+(bgSrc.indexOf("?")>-1?"&":"?")+"t="+Date.now();
    } else drawItems();
  });
}
function showDecoResult(stage,dataUrl,onClose){
  var res=document.createElement("div");
  res.id="deco-result-ov";
  res.style.cssText="position:absolute;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.72);cursor:pointer;";
  var img=document.createElement("img");img.src=dataUrl;
  img.style.cssText="max-width:80%;max-height:70%;object-fit:contain;display:block;box-shadow:0 0 0 3px rgba(180,160,255,0.7),0 8px 32px rgba(0,0,0,0.7);";
  var hint=document.createElement("div");hint.textContent="▼ 클릭하면 계속 ▼";
  hint.style.cssText="margin-top:18px;color:rgba(210,195,255,0.8);font-size:11px;font-family:sans-serif;";
  var saveBtn=document.createElement("button");saveBtn.textContent="📸 사진 저장";
  saveBtn.style.cssText="margin-top:12px;background:rgba(40,30,80,0.85);border:1.5px solid rgba(180,160,255,0.5);color:rgba(220,210,255,0.95);font-size:10px;padding:6px 18px;cursor:pointer;font-family:sans-serif;";
  saveBtn.onclick=function(e){e.stopPropagation();var a=document.createElement("a");a.href=dataUrl;a.download="deco_result.png";a.click();};
  var easter=document.createElement("div");
  easter.textContent="🎂 이 케이크, 회단에게 DM으로 보내보는 건 어떨까...?";
  easter.style.cssText="position:absolute;bottom:6px;right:8px;font-family:sans-serif;font-size:9px;color:rgba(255,255,255,0.28);letter-spacing:0.03em;pointer-events:none;user-select:none;white-space:nowrap;";
  res.appendChild(img);res.appendChild(hint);res.appendChild(saveBtn);res.appendChild(easter);
  stage.appendChild(res);
  res.addEventListener("click",function(){res.remove();onClose();},{once:true});
}
function doFade(){var ov=$i("ov");ov.style.transition="opacity .3s";ov.style.opacity="1";return sleep(300).then(function(){ov.style.transition="opacity .4s";ov.style.opacity="0";return sleep(400);});}
function renderChars(s){
  var L=$i("char-layer");L.innerHTML="";
  var ch=s.chars||(s.charUrl?[{url:s.charUrl,posX:50,posY:0}]:[]);
  ch.forEach(function(c,ci){
    if(!c.url)return;
    var img=document.createElement("img");
    img.className="cslot";img.src=c.url;
    img.style.left=(c.posX||50)+"%";
    img.style.bottom=(c.posY||0)+"%";
    img.style.maxHeight=(c.size||85)+"%";
    img.style.zIndex=52+ci;
    img.style.transform=c.flip?"translateX(-50%) scaleX(-1)":"translateX(-50%)";
    img.style.animation="cfade .5s ease forwards";
    L.appendChild(img);
  });
}
function showText(s){
  var box=$i("dialog-box"),nm=$i("speaker-name"),tx=$i("dialog-text"),ct=$i("dialog-continue");
  box.style.display="block";$i("choices-box").style.display="none";
  if(s.speaker){nm.textContent=s.speaker;nm.style.display="block";}else{nm.style.display="none";}
  tx.textContent="";ct.style.display="none";tdone=false;
  if(ttimer)clearInterval(ttimer);
  if(s.sfxUrl&&s.sfxTrigger==="text-start"){var sa=new Audio(s.sfxUrl);sa.volume=sv;sa.play().catch(function(){});}
  var text=s.text||"",speed=s.speed!=null?s.speed:30;
  if(speed===0){tx.textContent=text;ct.style.display=s.type==="choice"?"none":"block";tdone=true;
    if(s.sfxUrl&&s.sfxTrigger==="text-end"){var se=new Audio(s.sfxUrl);se.volume=sv;se.play().catch(function(){});}
    return;}
  var i=0;
  ttimer=setInterval(function(){
    if(i<text.length){tx.textContent=text.slice(0,++i);}
    else{clearInterval(ttimer);if(s.type!=="choice")ct.style.display="block";tdone=true;
      if(s.sfxUrl&&s.sfxTrigger==="text-end"){var se2=new Audio(s.sfxUrl);se2.volume=sv;se2.play().catch(function(){});}
    }
  },speed);
}
function showChoices(s){
  var box=$i("choices-box");box.innerHTML="";box.style.display="flex";
  $i("dialog-continue").style.display="none";
  var allImgs=(s.choices||[]).filter(function(c){return c.imgUrl;}).map(function(c){return{url:c.imgUrl,name:c.imgName||""};});
  _allChoiceImgs=allImgs;
  (s.choices||[]).forEach(function(c,i){
    var btn=document.createElement("button");
    btn.className="choice-btn";btn.textContent=c.text||("선택지 "+(i+1));
    btn.onclick=function(e){
      e.stopPropagation();box.style.display="none";
      if(c.imgUrl){_lastChoiceBgImg={url:c.imgUrl,name:c.imgName||""};_lastChoiceImgs=[{url:c.imgUrl,name:c.imgName||""}];}
      else{_lastChoiceBgImg=null;_lastChoiceImgs=[];}
      var t=c.target!=null&&c.target!==""?parseInt(c.target):idx+1;showScene(t);
    };
    box.appendChild(btn);
  });
}
function showEnd(s){
  stopBgm();
  $i("choices-box").style.display="none";
  $i("dialog-box").style.display="none";
  if(s&&s.sfxUrl){var se=new Audio(s.sfxUrl);se.volume=sv;se.play().catch(function(){});}
  var eo=$i("ending-overlay"),en=$i("ending-num"),ed=$i("ending-desc");
  var hasN=s&&s.endingNumber&&s.endingNumber!=="";
  var hasD=s&&s.endingDesc&&s.endingDesc!=="";
  en.textContent=hasN?"ENDING "+s.endingNumber:"";
  ed.textContent=hasD?s.endingDesc:(s&&s.text?s.text:"");
  eo.style.display="flex";eo.style.cursor="pointer";
  eo.onclick=function(){goTitle();};
  run=false;
}
function handleClick(){
  if($i("deco-ov")||$i("deco-result-ov"))return;
  if(vop){$i("vol-panel").style.display="none";vop=false;return;}
  if(!run){
    if($i("title-overlay").style.display!=="none"){
      if(!_titleReady){
        _titleReady=true;
        if(TBMU){
          if(!tba){tba=new Audio();tba.src=TBMU;tba.loop=true;tba.volume=bv;}
          else{tba.currentTime=0;}
          tba.play().catch(function(){});
          $i("title-hint").textContent=TC.subtitle||"▼ Click to Start ▼";
          return;
        }
      }
      startGame(0);
    } else {goTitle();}
    return;
  }
  if(!tdone){
    if(ttimer)clearInterval(ttimer);
    var s=SC[idx];$i("dialog-text").textContent=s?s.text:"";tdone=true;
    if(s&&s.sfxUrl&&s.sfxTrigger==="text-end"){var a=new Audio(s.sfxUrl);a.volume=sv;a.play().catch(function(){});}
    if(s&&s.type==="choice")showChoices(s);else $i("dialog-continue").style.display="block";
    return;
  }
  var cb=$i("choices-box");if(cb.style.display==="flex")return;
  if(idx<SC.length-1)showScene(idx+1);else showEnd();
}
$i("title-text").textContent=TC.text||"Story";
$i("title-hint").textContent=TBMU?(TC.subtitlePre||"▼ Click to Play BGM ▼"):(TC.subtitle||"▼ Click to Start ▼");
if(TBU){$i("stage-bg").src=TBU;$i("stage-bg").style.opacity="1";}
setTimeout(function(){$i("LDR").style.display="none";goTitle();},500);
</script>
